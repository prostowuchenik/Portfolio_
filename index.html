<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Віртуальне портфоліо — шаблон</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <style>
      html, body { margin:0; height:100%; overflow:hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      
      /* Темна панель опису по центру екрана */
      #infoPanel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(1200px, calc(100vw - 32px)); 
        max-height: calc(100vh - 48px); 
        background: rgba(18, 18, 18, 0.86);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 14px 14px 12px 14px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        display: none;
        z-index: 10;
        backdrop-filter: blur(6px);
        flex-direction: column;
      }

      /* Стилі для зображення */
      #infoPanel img {
        width: 100%;
        height: auto; 
        max-height: calc(100vh - 280px); 
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none; 
        flex-shrink: 0; 
      }

      /* Текст та темний скроллбар */
      #infoTextContainer {
        overflow-y: auto; 
        padding-right: 8px; 
        scrollbar-width: thin; 
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
      }

      #infoTextContainer::-webkit-scrollbar {
        width: 6px;
      }
      #infoTextContainer::-webkit-scrollbar-track {
        background: transparent;
      }
      #infoTextContainer::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
      #infoTextContainer::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* === НАЛАШТУВАННЯ РОЗМІРУ ТЕКСТУ === */
      #infoTextContainer h3 { 
        margin: 0 0 8px 0; 
        font-size: 24px; 
        line-height: 1.2; 
      }

      #infoTextContainer .meta { 
        opacity: 0.85; 
        font-size: 20px; 
        margin-bottom: 14px;
      }

      #infoTextContainer .desc { 
        font-size: 23px; 
        line-height: 1.5; 
        white-space: pre-wrap; 
      }

      #hint {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.88);
        color: #111;
        font-size: 13px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        z-index: 10;
        max-width: min(520px, calc(100vw - 32px));
      }
      #hint code { background: rgba(0,0,0,0.08); padding: 1px 6px; border-radius: 8px; }
      
      a-scene { height: 100vh; width: 100vw; }

      /* === СТАРТОВЕ МОДАЛЬНЕ ВІКНО МАРШРУТУ === */
      #pathModalOverlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(10, 10, 10, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
      }
      #pathModalOverlay h2 { margin: 0 0 8px 0; }
      #pathModalOverlay p { margin: 0 0 20px 0; opacity: 0.8; text-align: center; font-size: 18px; line-height: 1.5; }
      
      #planContainer {
        position: relative;
        width: min(900px, 90vw);
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
      }
      #planContainer img {
        display: block;
        width: 100%;
        height: auto;
      }
      .plan-point {
        position: absolute;
        width: 16px; height: 16px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        z-index: 2;
        transition: transform 0.1s, background-color 0.2s;
      }
      .point-edge {
        background-color: rgba(150, 150, 150, 0.4);
        pointer-events: none;
      }
      .point-inner {
        background-color: #fff;
        border: 3px solid #333;
        cursor: pointer;
      }
      .point-inner:hover {
        transform: translate(-50%, -50%) scale(1.3);
      }
      .point-selected {
        background-color: #ff3b3b;
        border-color: #ff3b3b;
      }
    </style>
  </head>

  <body>
    <div id="pathModalOverlay">
      <p>Натисніть на доступну точку один раз для вибору,<br>та вдруге для переміщення на вказану позицію.</p>
      
      <div id="planContainer">
        <img src="./assets/01.jpg" alt="План інтер'єру">
        <div id="planPoints"></div>
      </div>
    </div>

    <div id="infoPanel" aria-live="polite">
      <img id="infoImage" src="" alt="Artwork">
      <div id="infoTextContainer">
        <h3 id="infoTitle">—</h3>
        <div class="meta" id="infoMeta">—</div>
        <div class="desc" id="infoDesc">—</div>
      </div>
    </div>

    <div id="hint" style="cursor: pointer;" title="Натисніть, щоб згорнути/розгорнути">
      <div id="hint-full">
        Керування: <code>W A S D</code> — рух, <code>миша</code> — огляд.<br/>
        <code>Лівий клік</code> по роботі — опис, <code>правий клік</code> — сховати опис.
      </div>
      <div id="hint-collapsed" style="display: none; font-weight: 1200; text-align: center;">
        ⚙️ Як рухатись?
      </div>
    </div>

    <a-scene renderer="colorManagement: true; physicallyCorrectLights: true" background="color: #101010">
      
      <a-entity id="rig" position="0 0 0">
        <a-camera id="camera"
                  position="0 1.65 0"
                  wasd-controls="acceleration: 32"
                  look-controls="pointerLockEnabled: true"
                  wall-collider>
          <a-entity cursor="fuse: false"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.003; radiusOuter: 0.015"
                    material="color: white; shader: flat; opacity: 0.6; transparent: true"
                    raycaster="objects: .clickable; far: 20"
                    auto-hide-cursor="timeout: 1000; deadzone: 15">
          </a-entity>
        </a-camera>
      </a-entity>

      <a-entity id="lights"></a-entity>
      <a-entity id="room" position="0 0 0"></a-entity>
      
    </a-scene>

    <script type="module" src="./app.js"></script>
  </body>
</html>
